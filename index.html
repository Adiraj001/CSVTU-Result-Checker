<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests">
<meta name="referrer" content="no-referrer">
<title>CSVTU Student Portal</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <div class="header">
        <h1>CSVTU Student Portal</h1>
        <span class="credit">Made by Adiraj</span>
        <p>Result & Admit Card Redirect</p>
    </div>

    <div class="form-group">
        <label for="studentSearch">Student Name</label>
        <input type="text" id="studentSearch" list="studentList" placeholder="Search student name">
        <datalist id="studentList"></datalist>
        <small id="studentStatus">Loading student list...</small>
    </div>

    <div class="form-group">
        <label for="rollNo">Roll Number</label>
        <input type="text" id="rollNo" placeholder="Enter 12-digit Roll No" maxlength="12">
    </div>

    <div class="form-group">
        <label for="action">Action</label>
        <select id="action">
            <option value="">Select</option>
            <option value="result">Result</option>
            <option value="admit">Admit Card</option>
        </select>
    </div>

    <div class="form-group">
        <label for="examType">Exam Type</label>
        <select id="examType">
            <option value="Regular">Regular</option>
            <option value="RTRV">RTRV</option>
            <option value="Backlog">Backlog</option>
        </select>
    </div>

    <div class="form-group">
        <label for="semester">Semester</label>
        <select id="semester">
            <option value="">Select Semester</option>
            <option value="1">1st</option>
            <option value="2">2nd</option>
            <option value="3">3rd</option>
            <option value="4">4th</option>
            <option value="5">5th</option>
            <option value="6">6th</option>
            <option value="7">7th</option>
            <option value="8">8th</option>
        </select>
    </div>

    <div class="form-group">
        <label for="examMonth">Exam Month</label>
   <select id="examMonth">
            <option value="" disabled selected>Select Exam Month</option>
        <option value="NOV-DEC">Nov&ndash;Dec</option>
        <option value="APR-MAY">Apr&ndash;May</option>
   </select>

    </div>

    <div class="form-group">
        <label for="examYear">Exam Year</label>
        <select id="examYear">
            <option value="">Select Year</option>
        </select>
    </div>

    <button id="openBtn">Open Official Page</button>
    <small id="securityStatus" role="status"></small>

    <div class="footer-text">
        <span>Made by Adiraj</span>
        Redirects to official CSVTU website
    </div>
</div>

<script src="DATA/studentdata.js"></script>
<script src="script.js"></script>
</body>
</html>
